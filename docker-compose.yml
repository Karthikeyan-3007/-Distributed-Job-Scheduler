version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://scheduler:scheduler@db:5432/scheduler
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://scheduler:scheduler@db:5432/scheduler
      WORKER_CONCURRENCY: "4"
    entrypoint: ["./docker-entrypoint.sh"]
    command: ["python", "-m", "app.workers.worker"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      replicas: 2

  scheduler:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://scheduler:scheduler@db:5432/scheduler
    entrypoint: ["./docker-entrypoint.sh"]
    command: ["python", "-m", "app.scheduler.scheduler"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
